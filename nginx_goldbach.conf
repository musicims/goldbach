# Goldbach Community Server — nginx reverse proxy
# Install: cp nginx_goldbach.conf /etc/nginx/sites-available/goldbach
#          ln -s /etc/nginx/sites-available/goldbach /etc/nginx/sites-enabled/
#          rm /etc/nginx/sites-enabled/default
#          nginx -t && systemctl restart nginx
#
# Then close port 8080 externally:
#          ufw allow 22/tcp
#          ufw allow 80/tcp
#          ufw enable

# Rate limiting: 10 requests/sec per IP, burst of 20
limit_req_zone $binary_remote_addr zone=goldbach:10m rate=10r/s;

server {
    listen 80;
    server_name _;

    # API endpoints
    location /api/ {
        limit_req zone=goldbach burst=20 nodelay;

        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Block everything else
    location / {
        return 404 '{"error": "not found"}';
        add_header Content-Type application/json;
    }
}
